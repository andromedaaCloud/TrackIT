<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackIT - Expense Tracker</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X4FZRTTL1C"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-X4FZRTTL1C');
    </script>
    
    <!-- PWA Config -->
    <meta name="theme-color" content="#FF6B6B">
    <link rel="manifest" href="/TrackIT/manifest.json">

    <!-- Safari iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TrackIT">
    <link rel="apple-touch-icon" href="/TrackIT/icon-192.png">
    <link rel="apple-touch-startup-image" href="/TrackIT/icon-512.png">
    
    <!-- DM Sans + Fraunces Font -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --coral:      #FF6B6B;
            --coral-dark: #E85555;
            --coral-light:#FFE8E8;
            --cream:      #FFFBF5;
            --cream-dark: #FFF0E0;
            --peach:      #FFD4B2;
            --amber:      #FF9F43;
            --text-dark:  #2D1B0E;
            --text-mid:   #6B4C3B;
            --text-soft:  #A07860;
            --shadow:     rgba(255,107,107,0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            background-image:
                radial-gradient(ellipse at 15% 15%, #FFE8D6 0%, transparent 55%),
                radial-gradient(ellipse at 85% 85%, #FFD4B2 0%, transparent 55%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width:1100px; margin:0 auto; }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 4px 24px var(--shadow), 0 1px 4px rgba(0,0,0,0.04);
            border: 1.5px solid #FFE8D6;
        }

        .header { text-align:center; margin-bottom:32px; }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.8em;
            font-weight: 900;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--coral) 0%, var(--amber) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p { font-size:1em; color:var(--text-soft); font-weight:500; }

        .form-group { margin-bottom:18px; }

        label { display:block; margin-bottom:6px; font-weight:600; font-size:0.9em; color:var(--text-mid); }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--peach);
            border-radius: 12px;
            font-size: 1em;
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--coral);
            background: white;
            box-shadow: 0 0 0 3px rgba(255,107,107,0.12);
        }

        .form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }

        .btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--coral) 0%, var(--amber) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,107,107,0.35); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:20px; }

        .stat-card {
            background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 100%);
            padding: 20px;
            border-radius: 18px;
            border: 2px solid var(--peach);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content:''; position:absolute; top:-20px; right:-20px;
            width:70px; height:70px;
            background:var(--coral-light); border-radius:50%; opacity:0.5;
        }

        .stat-label { font-size:0.78em; font-weight:700; color:var(--text-soft); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }

        .stat-value { font-family:'Fraunces',serif; font-size:1.9em; font-weight:700; color:var(--coral-dark); }

        .expense-item {
            display:flex; justify-content:space-between; align-items:center;
            padding:16px; background:var(--cream); border-radius:14px;
            margin-bottom:10px; border:2px solid transparent; transition:all 0.2s;
        }

        .expense-item:hover { border-color:var(--peach); background:white; box-shadow:0 4px 12px var(--shadow); }
        .expense-details { flex:1; }
        .expense-header { display:flex; gap:8px; margin-bottom:6px; flex-wrap:wrap; }

        .badge { padding:4px 10px; border-radius:20px; font-size:0.78em; font-weight:700; }
        .badge-person  { background:#FFF0E0; color:#C45E00; }
        .badge-shared  { background:var(--coral-light); color:var(--coral-dark); }
        .badge-category{ background:#F0F4FF; color:#3D5AFE; }

        .expense-amount { font-family:'Fraunces',serif; font-size:1.4em; font-weight:700; color:var(--coral-dark); }
        .expense-owed   { font-size:0.85em; color:var(--amber); font-weight:600; margin-top:4px; }

        .btn-edit, .btn-delete {
            padding:7px 13px; border:none; border-radius:8px; font-weight:600;
            cursor:pointer; margin-left:6px; font-size:0.82em;
            font-family:'DM Sans',sans-serif; transition:all 0.2s;
        }
        .btn-edit  { background:#EEF2FF; color:#3D5AFE; }
        .btn-edit:hover { background:#3D5AFE; color:white; }
        .btn-delete{ background:var(--coral-light); color:var(--coral-dark); }
        .btn-delete:hover { background:var(--coral-dark); color:white; }

        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(45,27,14,0.5); backdrop-filter:blur(6px);
            z-index:1000; align-items:center; justify-content:center; padding:20px;
        }
        .modal.active { display:flex; }

        .modal-content {
            background:white; border-radius:24px; padding:28px;
            max-width:500px; width:100%; max-height:90vh; overflow-y:auto;
            border:2px solid var(--peach);
        }

        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .modal-title { font-family:'Fraunces',serif; font-size:1.4em; font-weight:700; color:var(--text-dark); }
        .close-modal {
            background:var(--cream); border:none; font-size:1.4em; cursor:pointer;
            color:var(--text-soft); width:34px; height:34px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
        }

        .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .auth-card { max-width:420px; width:100%; }
        .auth-tabs { display:flex; gap:8px; margin-bottom:20px; }

        .auth-tab {
            flex:1; padding:12px; background:var(--cream); border:2px solid var(--peach);
            border-radius:12px; font-weight:700; cursor:pointer; color:var(--text-mid);
            font-family:'DM Sans',sans-serif; transition:all 0.2s;
        }
        .auth-tab.active { background:linear-gradient(135deg,var(--coral) 0%,var(--amber) 100%); color:white; border-color:transparent; }

        .auth-form { display:none; }
        .auth-form.active { display:block; }

        .message { padding:12px 16px; border-radius:12px; margin-bottom:16px; font-size:0.9em; display:none; font-weight:500; }
        .error   { background:var(--coral-light); color:var(--coral-dark); }
        .success { background:#E8F8F0; color:#1A7A4A; }

        .user-bar {
            display:flex; align-items:center; gap:12px; padding:16px 20px;
            background:linear-gradient(135deg,var(--cream) 0%,var(--cream-dark) 100%);
            border-radius:18px; margin-bottom:20px; border:2px solid var(--peach);
        }
        .user-avatar {
            width:48px; height:48px; border-radius:50%;
            background:linear-gradient(135deg,var(--coral) 0%,var(--amber) 100%);
            display:flex; align-items:center; justify-content:center;
            color:white; font-weight:800; font-size:1.3em;
            font-family:'Fraunces',serif; box-shadow:0 4px 12px var(--shadow);
        }
        .user-info { flex:1; }
        .user-name { font-weight:700; color:var(--text-dark); }
        .user-email{ font-size:0.85em; color:var(--text-soft); }
        .btn-logout {
            padding:8px 16px; background:var(--coral-light); color:var(--coral-dark);
            border:none; border-radius:10px; font-weight:700; cursor:pointer;
            font-family:'DM Sans',sans-serif; font-size:0.9em; transition:all 0.2s;
        }
        .btn-logout:hover { background:var(--coral-dark); color:white; }

        .accordion { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
        .accordion-item { border:2px solid var(--peach); border-radius:16px; overflow:hidden; }
        .accordion-header {
            width:100%; padding:14px 18px; background:var(--cream); border:none;
            font-weight:700; cursor:pointer; color:var(--text-dark);
            display:flex; justify-content:space-between; align-items:center;
            font-family:'DM Sans',sans-serif; font-size:1em; transition:background 0.2s;
        }
        .accordion-header:hover { background:var(--cream-dark); }
        .accordion-header.active { background:linear-gradient(135deg,var(--coral) 0%,var(--amber) 100%); color:white; }
        .accordion-arrow { transition:transform 0.3s; font-size:0.85em; }
        .accordion-header.active .accordion-arrow { transform:rotate(180deg); }
        .accordion-body { display:none; padding:16px; background:white; }
        .accordion-body.open { display:block; }

        .checkbox-group { display:flex; align-items:center; gap:8px; margin:12px 0; }
        .checkbox-group input { width:20px; height:20px; accent-color:var(--coral); }

        .empty { text-align:center; padding:40px; color:var(--text-soft); font-weight:500; }

        .btn-settle {
            padding:7px 13px; border:none; border-radius:8px; font-weight:700;
            cursor:pointer; margin-left:6px; font-size:0.82em;
            font-family:'DM Sans',sans-serif; background:#E8F8F0; color:#1A7A4A; transition:all 0.2s;
        }
        .btn-settle:hover { background:#1A7A4A; color:white; }

        .settled-section { margin-top:10px; }
        .settled-toggle {
            width:100%; padding:14px 18px; background:var(--cream);
            border:2px dashed var(--peach); border-radius:14px; font-weight:700;
            color:var(--text-soft); cursor:pointer; font-family:'DM Sans',sans-serif;
            font-size:0.95em; text-align:left; display:flex; justify-content:space-between;
            align-items:center; transition:all 0.2s;
        }
        .settled-toggle:hover { background:var(--cream-dark); }
        .settled-list { display:none; margin-top:10px; }
        .settled-list.open { display:block; }
        .expense-item.settled { opacity:0.5; background:var(--cream); }
        .expense-item.settled .expense-amount,
        .expense-item.settled div[style*="font-weight:600"],
        .expense-item.settled div[style*="font-weight: 600"] { text-decoration:line-through; }
        .settled-badge { padding:4px 10px; border-radius:20px; font-size:0.78em; font-weight:700; background:#E8F8F0; color:#1A7A4A; }

        .group-accordion { border:2px solid var(--peach); border-radius:16px; overflow:hidden; margin-bottom:10px; }
        .group-accordion-header {
            width:100%; padding:14px 18px; background:var(--cream-dark); border:none;
            font-weight:700; cursor:pointer; color:var(--text-dark);
            display:flex; justify-content:space-between; align-items:center;
            font-family:'DM Sans',sans-serif; font-size:1em; transition:background 0.2s;
        }
        .group-accordion-header:hover { background:var(--peach); }
        .group-accordion-header.open { background:linear-gradient(135deg,var(--coral) 0%,var(--amber) 100%); color:white; }
        .group-accordion-header.open .g-arrow { transform:rotate(180deg); }
        .g-arrow { transition:transform 0.3s; font-size:0.85em; }
        .group-accordion-body { display:none; padding:12px; background:white; }
        .group-accordion-body.open { display:block; }
        .group-meta { display:flex; gap:14px; flex-wrap:wrap; font-size:0.85em; font-weight:600; margin-top:4px; }
        .group-meta .meta-spent { color:var(--coral-dark); }
        .group-meta .meta-owed  { color:var(--amber); }

        .tabs { display:flex; gap:8px; margin-bottom:16px; }
        .tab {
            flex:1; padding:10px; background:var(--cream); border:2px solid var(--peach);
            border-radius:10px; font-weight:700; cursor:pointer; color:var(--text-soft);
            font-family:'DM Sans',sans-serif; transition:all 0.2s;
        }
        .tab.active { background:linear-gradient(135deg,var(--coral) 0%,var(--amber) 100%); color:white; border-color:transparent; }

        @media (max-width:768px) {
            .header h1 { font-size:2.2em; }
            .stats { grid-template-columns:1fr 1fr; }
            .form-row { grid-template-columns:1fr; }
            .expense-item { flex-direction:column; align-items:flex-start; gap:12px; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginPage" class="auth-container">
        <div class="card auth-card">
            <div class="header">
                <h1><svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="36" height="36" rx="10" fill="url(#wg)"/>
  <defs><linearGradient id="wg" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#FF6B6B"/><stop offset="1" stop-color="#FF9F43"/></linearGradient></defs>
  <rect x="7" y="12" width="22" height="14" rx="3" fill="white" opacity="0.95"/>
  <rect x="7" y="10" width="22" height="5" rx="2" fill="white" opacity="0.6"/>
  <circle cx="24" cy="19" r="2.5" fill="#FF6B6B"/>
  <line x1="7" y1="15" x2="29" y2="15" stroke="#FFD4B2" stroke-width="1"/>
</svg> TrackIT</h1>
                <p>Smart expense tracking</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="errorMsg" class="message error"></div>
            <div id="successMsg" class="message success"></div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <div style="text-align: center; margin-top: 12px;">
                    <a href="#" onclick="switchTab('forgot'); return false;" style="color: #10b981; text-decoration: none; font-weight: 600;">Forgot Password?</a>
                </div>
            </form>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="signupName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signupConfirm" required minlength="6">
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>

            <form id="forgotForm" class="auth-form">
                <p style="text-align: center; margin-bottom: 16px; color: #065f46;">Enter your email to reset password</p>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="resetEmail" required>
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
                <div style="text-align: center; margin-top: 12px;">
                    <a href="#" onclick="switchTab('login'); return false;" style="color: #10b981; text-decoration: none; font-weight: 600;">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display: none;">
        <div class="container">
            <div class="header">
                <h1><svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="36" height="36" rx="10" fill="url(#wg)"/>
  <defs><linearGradient id="wg" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#FF6B6B"/><stop offset="1" stop-color="#FF9F43"/></linearGradient></defs>
  <rect x="7" y="12" width="22" height="14" rx="3" fill="white" opacity="0.95"/>
  <rect x="7" y="10" width="22" height="5" rx="2" fill="white" opacity="0.6"/>
  <circle cx="24" cy="19" r="2.5" fill="#FF6B6B"/>
  <line x1="7" y1="15" x2="29" y2="15" stroke="#FFD4B2" stroke-width="1"/>
</svg> TrackIT</h1>
                <p>Track expenses, split costs, stay organized</p>
            </div>

            <div class="card">
                <div class="user-bar">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">User</div>
                        <div class="user-email" id="userEmail">email</div>
                    </div>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 18px; color: #065f46;">Add Expense</h2>
                <form id="expenseForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label>Amount (₹)</label>
                            <input type="number" id="amount" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Split with (leave empty if just you)</label>
                            <input type="text" id="splitWith" placeholder="John, Mary">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="category" required>
                                <option value="">Select</option>
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Bills">💡 Bills</option>
                                <option value="Health">💊 Health</option>
                                <option value="Other">📦 Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="description" placeholder="What was this for?">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="isShared">
                        <label for="isShared" style="margin: 0;">Split cost (if unchecked, they owe full amount)</label>
                    </div>
                    <button type="submit" class="btn">Add Expense</button>
                </form>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <div style="font-weight:700; color:#065f46; font-size:0.95em;">📊 Summary</div>
                    <div id="statsLabel" style="font-size:0.8em; font-weight:600; color:#10b981; background:#d1fae5; padding:4px 10px; border-radius:10px;">All Expenses</div>
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Total Spent</div>
                        <div class="stat-value">₹<span id="totalSpent">0</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Transactions</div>
                        <div class="stat-value"><span id="totalCount">0</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Others Owe Me</div>
                        <div class="stat-value">₹<span id="totalOwed">0</span></div>
                    </div>
                </div>
                <button class="btn" onclick="downloadCSV()" style="margin-top: 12px;">📥 Download CSV</button>
            </div>

            <div class="card">
                <div style="margin-bottom: 16px;">
                    <select id="viewSelect" onchange="switchView(this.value)" style="width:100%; padding:12px 14px; border:2px solid #d1fae5; border-radius:10px; font-size:1em; font-family:'DM Sans',sans-serif; font-weight:600; color:#065f46; background:white; cursor:pointer;">
                        <option value="all">📋 All Expenses</option>
                        <option value="person">👤 By Person</option>
                        <option value="month">📅 By Month</option>
                    </select>
                </div>
                <div id="expenseList"><div class="empty">Loading...</div></div>
            </div>

            <!-- Settled Expenses -->
            <div class="card settled-section">
                <button class="settled-toggle" onclick="toggleSettled(this)">
                    <span>✅ Settled Expenses <span id="settledCount" style="background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:10px;font-size:0.85em;margin-left:6px;">0</span></span>
                    <span class="g-arrow">▼</span>
                </button>
                <div class="settled-list" id="settledList"></div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Expense</h2>
                <button class="close-modal" onclick="closeEditModal()">×</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="editDate" required>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="editAmount" step="0.01" min="0" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Split with</label>
                        <input type="text" id="editSplitWith" placeholder="John, Mary">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="editCategory" required>
                            <option value="">Select</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Bills">💡 Bills</option>
                            <option value="Health">💊 Health</option>
                            <option value="Other">📦 Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="editDescription">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="editIsShared">
                    <label for="editIsShared" style="margin: 0;">Split cost</label>
                </div>
                <button type="submit" class="btn">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        // Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyDz7h-ch2T86bXqs6rNDhQOxw_7p7uxAAY",
            authDomain: "trackit-83c83.firebaseapp.com",
            projectId: "trackit-83c83",
            storageBucket: "trackit-83c83.firebasestorage.app",
            messagingSenderId: "715435896116",
            appId: "1:715435896116:web:8415fce9e7294c6dbac961"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();
        let expenses = [];
        let currentUser = null;
        let currentView = 'all';

        document.getElementById('date').valueAsDate = new Date();

        // Auth
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userName').textContent = user.displayName || user.email;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').textContent = (user.displayName || user.email).charAt(0).toUpperCase();
                loadExpenses();
            } else {
                currentUser = null;
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else if (tab === 'signup') {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            } else if (tab === 'forgot') {
                document.getElementById('forgotForm').classList.add('active');
            }
            
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await auth.signInWithEmailAndPassword(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value
                );
            } catch (err) {
                showError(err.message);
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('signupPassword').value;
            const conf = document.getElementById('signupConfirm').value;
            if (pass !== conf) {
                showError('Passwords do not match');
                return;
            }
            try {
                const cred = await auth.createUserWithEmailAndPassword(
                    document.getElementById('signupEmail').value, pass
                );
                await cred.user.updateProfile({
                    displayName: document.getElementById('signupName').value
                });
                showSuccess('Account created!');
            } catch (err) {
                showError(err.message);
            }
        });

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await auth.sendPasswordResetEmail(document.getElementById('resetEmail').value);
                showSuccess('Reset email sent!');
                setTimeout(() => switchTab('login'), 2000);
            } catch (err) {
                showError(err.message);
            }
        });

        async function logout() {
            if (confirm('Logout?')) await auth.signOut();
        }

        // Expenses
        function loadExpenses() {
            db.collection('expenses')
                .where('userId', '==', currentUser.uid)
                .onSnapshot(snap => {
                    expenses = [];
                    snap.forEach(doc => expenses.push({id: doc.id, ...doc.data()}));
                    expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
                    updateStats();
                    renderExpenses();
                });
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await db.collection('expenses').add({
                    userId: currentUser.uid,
                    date: document.getElementById('date').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    splitWith: document.getElementById('splitWith').value.trim(),
                    category: document.getElementById('category').value,
                    description: document.getElementById('description').value.trim(),
                    isShared: document.getElementById('isShared').checked,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                e.target.reset();
                document.getElementById('date').valueAsDate = new Date();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        async function settleExpense(id) {
            if (confirm('Mark this expense as settled?')) {
                await db.collection('expenses').doc(id).update({ settled: true });
            }
        }

        async function unsettleExpense(id) {
            await db.collection('expenses').doc(id).update({ settled: false });
        }

        function toggleGroup(btn) {
            const body = btn.nextElementSibling;
            const isOpen = body.classList.contains('open');
            body.classList.toggle('open', !isOpen);
            btn.classList.toggle('open', !isOpen);
        }

        function toggleSettled(btn) {
            const list = document.getElementById('settledList');
            const arrow = btn.querySelector('.g-arrow');
            const isOpen = list.classList.contains('open');
            list.classList.toggle('open', !isOpen);
            arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
        }

        function renderSettled() {
            const settled = expenses.filter(e => e.settled);
            document.getElementById('settledCount').textContent = settled.length;
            const list = document.getElementById('settledList');
            if (settled.length === 0) { list.innerHTML = '<div class="empty" style="padding:20px;">No settled expenses yet</div>'; return; }
            list.innerHTML = settled.map(e => `
                <div class="expense-item settled">
                    <div class="expense-details">
                        <div class="expense-header">
                            <span class="badge badge-person">👤 ${e.splitWith || 'Just you'}</span>
                            <span class="badge badge-category">${e.category}</span>
                            <span class="settled-badge">✅ Settled</span>
                        </div>
                        <div style="font-weight:600;text-decoration:line-through;">${e.description || 'No description'}</div>
                        <div style="font-size:0.85em;color:#9ca3af;">${new Date(e.date).toLocaleDateString()}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="expense-amount" style="text-decoration:line-through;">₹${e.amount.toFixed(2)}</div>
                        <div style="margin-top:8px;">
                            <button class="btn-edit" onclick="unsettleExpense('${e.id}')" style="background:#fef3c7;color:#92400e;">↩ Unsettle</button>
                            <button class="btn-delete" onclick="deleteExpense('${e.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function deleteExpense(id) {
            if (confirm('Delete?')) {
                await db.collection('expenses').doc(id).delete();
            }
        }

        function calculateOwed(exp) {
            if (!exp.splitWith || exp.splitWith.trim() === '') return 0;
            
            const lower = exp.splitWith.toLowerCase().trim();
            if (lower === 'self' || lower === 'me' || lower === 'you') return 0;
            
            const people = exp.splitWith.split(',').map(p => p.trim()).filter(Boolean);
            if (people.length === 0) return 0;
            
            if (!exp.isShared) return exp.amount;
            
            const total = people.length + 1;
            return (exp.amount / total) * people.length;
        }

        function updateStats() {
            // Always exclude settled expenses
            let filtered = expenses.filter(e => !e.settled);

            // Filter further based on current view label
            const labelMap = { all: '📋 All Expenses', person: '👤 By Person', month: '📅 By Month' };
            document.getElementById('statsLabel').textContent = labelMap[currentView] || 'All Expenses';

            // For person/month views, stats still reflect all active expenses
            // but label updates to show context
            const total = filtered.reduce((s, e) => s + e.amount, 0);
            const count = filtered.length;
            const owed = filtered.reduce((s, e) => s + calculateOwed(e), 0);

            document.getElementById('totalSpent').textContent = total.toFixed(2);
            document.getElementById('totalCount').textContent = count;
            document.getElementById('totalOwed').textContent = owed.toFixed(2);
        }

        function switchView(view) {
            currentView = view;
            updateStats();
            renderExpenses();
        }

        function renderExpenses() {
            const list = document.getElementById('expenseList');
            if (expenses.filter(e => !e.settled).length === 0) {
                list.innerHTML = '<div class="empty">No active expenses</div>';
            } else {
                if (currentView === 'person') renderByPerson(list);
                else if (currentView === 'month') renderByMonth(list);
                else renderAll(list);
            }
            renderSettled();
        }

        function renderSection(view) {
            renderExpenses();
        }

        function renderAll(list) {
            const active = expenses.filter(e => !e.settled);
            if (active.length === 0) { list.innerHTML = '<div class="empty">No active expenses</div>'; return; }
            list.innerHTML = active.map(e => {
                const owed = calculateOwed(e);
                const person = e.splitWith || 'Just you';
                return `
                    <div class="expense-item">
                        <div class="expense-details">
                            <div class="expense-header">
                                <span class="badge badge-person">👤 ${person}</span>
                                <span class="badge badge-category">${e.category}</span>
                                ${e.isShared ? '<span class="badge badge-shared">🔀 Split</span>' : ''}
                            </div>
                            <div style="font-weight: 600; margin-bottom: 4px;">${e.description || 'No description'}</div>
                            <div style="font-size: 0.85em; color: #6b7280;">${new Date(e.date).toLocaleDateString()}</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="expense-amount">₹${e.amount.toFixed(2)}</div>
                            ${owed > 0 ? `<div class="expense-owed">Owed: ₹${owed.toFixed(2)}</div>` : ''}
                            <div style="margin-top: 8px;">
                                <button class="btn-settle" onclick="settleExpense('${e.id}')">✓ Settle</button>
                                <button class="btn-edit" onclick="openEditModal('${e.id}')">Edit</button>
                                <button class="btn-delete" onclick="deleteExpense('${e.id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let personGroups = {};

        function shareOnWhatsApp(person) {
            const data = personGroups[person];
            if (!data) return;

            const lines = data.list.map(e => {
                const owed = calculateOwed(e);
                const owedText = owed > 0 ? ` (your share: ₹${owed.toFixed(2)})` : '';
                return `• ${e.category} - ${e.description || 'No description'}: ₹${e.amount.toFixed(2)}${owedText}`;
            }).join('\n');

            const totalOwed = data.owed > 0 ? `\n💰 *Total you owe me: ₹${data.owed.toFixed(2)}*` : '';

            const message = `Hey ${person}! 👋\n\nHere's your expense summary from TrackIT:\n\n${lines}${totalOwed}\n\nTracked via TrackIT 📊`;

            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function renderByPerson(list) {
            const active = expenses.filter(e => !e.settled);
            personGroups = {};
            active.forEach(e => {
                const person = e.splitWith || 'Just you';
                if (!personGroups[person]) personGroups[person] = {list: [], total: 0, owed: 0};
                personGroups[person].list.push(e);
                personGroups[person].total += e.amount;
                personGroups[person].owed += calculateOwed(e);
            });

            if (Object.keys(personGroups).length === 0) { list.innerHTML = '<div class="empty">No active expenses</div>'; return; }

            list.innerHTML = Object.entries(personGroups).map(([person, data]) => `
                <div class="group-accordion">
                    <button class="group-accordion-header" onclick="toggleGroup(this)">
                        <div>
                            <div>👤 ${person}</div>
                            <div class="group-meta" style="margin-top:4px;">
                                <span class="meta-spent">Spent: ₹${data.total.toFixed(2)}</span>
                                ${data.owed > 0 ? `<span class="meta-owed">Owes: ₹${data.owed.toFixed(2)}</span>` : ''}
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;" onclick="event.stopPropagation()">
                            ${data.owed > 0 ? `
                            <button onclick="shareOnWhatsApp('${person}')"
                                style="background:#25D366;color:white;border:none;border-radius:8px;padding:6px 10px;font-size:0.8em;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                Share
                            </button>` : ''}
                            <span class="g-arrow" onclick="toggleGroup(this.closest('.group-accordion-header'))">▼</span>
                        </div>
                    </button>
                    <div class="group-accordion-body">
                        ${data.list.map(e => {
                            const owed = calculateOwed(e);
                            return `
                                <div class="expense-item">
                                    <div class="expense-details">
                                        <div class="expense-header">
                                            <span class="badge badge-category">${e.category}</span>
                                            ${e.isShared ? '<span class="badge badge-shared">🔀 Split</span>' : ''}
                                        </div>
                                        <div style="font-weight:600;">${e.description || 'No description'}</div>
                                        <div style="font-size:0.85em;color:#6b7280;">${new Date(e.date).toLocaleDateString()}</div>
                                    </div>
                                    <div style="text-align:right;">
                                        <div class="expense-amount">₹${e.amount.toFixed(2)}</div>
                                        ${owed > 0 ? `<div class="expense-owed">Owes: ₹${owed.toFixed(2)}</div>` : ''}
                                        <div style="margin-top:8px;">
                                            <button class="btn-settle" onclick="settleExpense('${e.id}')">✓ Settle</button>
                                            <button class="btn-edit" onclick="openEditModal('${e.id}')">Edit</button>
                                            <button class="btn-delete" onclick="deleteExpense('${e.id}')">Delete</button>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderByMonth(list) {
            const active = expenses.filter(e => !e.settled);
            const groups = {};
            active.forEach(e => {
                const month = e.date.substring(0, 7);
                if (!groups[month]) groups[month] = {list: [], total: 0, owed: 0};
                groups[month].list.push(e);
                groups[month].total += e.amount;
                groups[month].owed += calculateOwed(e);
            });

            if (Object.keys(groups).length === 0) { list.innerHTML = '<div class="empty">No active expenses</div>'; return; }

            list.innerHTML = Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0])).map(([month, data]) => {
                const monthName = new Date(month + '-01').toLocaleDateString('en-US', {month: 'long', year: 'numeric'});
                return `
                <div class="group-accordion">
                    <button class="group-accordion-header" onclick="toggleGroup(this)">
                        <div>
                            <div>📅 ${monthName}</div>
                            <div class="group-meta" style="margin-top:4px;">
                                <span class="meta-spent">Spent: ₹${data.total.toFixed(2)}</span>
                                ${data.owed > 0 ? `<span class="meta-owed">Owes: ₹${data.owed.toFixed(2)}</span>` : ''}
                            </div>
                        </div>
                        <span class="g-arrow">▼</span>
                    </button>
                    <div class="group-accordion-body">
                        ${data.list.map(e => {
                            const owed = calculateOwed(e);
                            return `
                                <div class="expense-item">
                                    <div class="expense-details">
                                        <div class="expense-header">
                                            <span class="badge badge-person">👤 ${e.splitWith || 'Just you'}</span>
                                            <span class="badge badge-category">${e.category}</span>
                                            ${e.isShared ? '<span class="badge badge-shared">🔀 Split</span>' : ''}
                                        </div>
                                        <div style="font-weight:600;">${e.description || 'No description'}</div>
                                        <div style="font-size:0.85em;color:#6b7280;">${new Date(e.date).toLocaleDateString()}</div>
                                    </div>
                                    <div style="text-align:right;">
                                        <div class="expense-amount">₹${e.amount.toFixed(2)}</div>
                                        ${owed > 0 ? `<div class="expense-owed">Owes: ₹${owed.toFixed(2)}</div>` : ''}
                                        <div style="margin-top:8px;">
                                            <button class="btn-settle" onclick="settleExpense('${e.id}')">✓ Settle</button>
                                            <button class="btn-edit" onclick="openEditModal('${e.id}')">Edit</button>
                                            <button class="btn-delete" onclick="deleteExpense('${e.id}')">Delete</button>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function openEditModal(id) {
            const expense = expenses.find(e => e.id === id);
            if (!expense) return;
            
            document.getElementById('editId').value = id;
            document.getElementById('editDate').value = expense.date;
            document.getElementById('editAmount').value = expense.amount;
            document.getElementById('editSplitWith').value = expense.splitWith || '';
            document.getElementById('editCategory').value = expense.category;
            document.getElementById('editDescription').value = expense.description || '';
            document.getElementById('editIsShared').checked = expense.isShared || false;
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            try {
                await db.collection('expenses').doc(id).update({
                    date: document.getElementById('editDate').value,
                    amount: parseFloat(document.getElementById('editAmount').value),
                    splitWith: document.getElementById('editSplitWith').value.trim(),
                    category: document.getElementById('editCategory').value,
                    description: document.getElementById('editDescription').value.trim(),
                    isShared: document.getElementById('editIsShared').checked,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeEditModal();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        function downloadCSV() {
            if (expenses.length === 0) return alert('No expenses');
            const rows = [['Date', 'Amount', 'Split With', 'Category', 'Description', 'Shared']];
            expenses.forEach(e => rows.push([
                e.date, e.amount, e.splitWith || '', e.category, e.description || '', e.isShared ? 'Yes' : 'No'
            ]));
            const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `trackit_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
